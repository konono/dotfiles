[mgr]
show_hidden = true
sort_by = "natural"
sort_dir_first = true
linemode = "size"

[preview]
wrap = "yes"
max_width = 1000
max_height = 1000

[opener]
edit = [
  { run = 'nvim "$@"', block = true, for = "unix" },
]

[open]
prepend_rules = [
  { mime = "application/octet-stream", use = "edit" },
]
